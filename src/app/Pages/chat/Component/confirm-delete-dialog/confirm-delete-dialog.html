<h2 mat-dialog-title>Xác nhận xóa</h2>
<mat-dialog-content>
  Bạn có chắc chắn muốn xóa phòng <strong>"{{ data.roomName }}"</strong> không? Hành động này không thể hoàn tác.
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onNoClick()">Hủy</button>
  <button mat-flat-button color="warn" [mat-dialog-close]="true" cdkFocusInitial>Xóa</button>
</mat-dialog-actions>
