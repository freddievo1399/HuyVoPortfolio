version: '3.8'

services:
  angular-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: angular_dev_container
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      # - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      # 🚨 THÊM DÒNG NÀY ĐỂ BỎ QUA CÂU HỎI KHẢO SÁT:
      - NG_CLI_ANALYTICS=false
    stdin_open: true
    tty: true
